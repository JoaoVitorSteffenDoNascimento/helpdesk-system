version: '3.8'

services:
  mongodb:
    image: mongo:${MONGODB_VERSION:-7}
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-helpdesk}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - helpdesk-network

  ticket-service:
    image: ${AZURE_REGISTRY_NAME:-localhost}.azurecr.io/ticket-service:${IMAGE_TAG:-latest}
    restart: on-failure:5
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/${MONGODB_DATABASE}_tickets
      SPRING_APPLICATION_NAME: ticket-service
      SERVER_PORT: ${TICKET_SERVICE_PORT:-8081}
      JAVA_OPTS: ${JAVA_OPTS:--Xmx512m -Xms256m}
    ports:
      - "${TICKET_SERVICE_PORT:-8081}:${TICKET_SERVICE_PORT:-8081}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${TICKET_SERVICE_PORT:-8081}/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - helpdesk-network
    labels:
      - "app=helpdesk"
      - "service=microservice"
      - "microservice=ticket"

  user-service:
    image: ${AZURE_REGISTRY_NAME:-localhost}.azurecr.io/user-service:${IMAGE_TAG:-latest}
    restart: on-failure:5
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/${MONGODB_DATABASE}_users
      SPRING_APPLICATION_NAME: user-service
      SERVER_PORT: ${USER_SERVICE_PORT:-8082}
      JAVA_OPTS: ${JAVA_OPTS:--Xmx512m -Xms256m}
    ports:
      - "${USER_SERVICE_PORT:-8082}:${USER_SERVICE_PORT:-8082}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${USER_SERVICE_PORT:-8082}/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - helpdesk-network
    labels:
      - "app=helpdesk"
      - "service=microservice"
      - "microservice=user"

  api-gateway:
    image: ${AZURE_REGISTRY_NAME:-localhost}.azurecr.io/api-gateway:${IMAGE_TAG:-latest}
    restart: on-failure:5
    environment:
      TICKET_SERVICE_URL: http://ticket-service:${TICKET_SERVICE_PORT:-8081}
      USER_SERVICE_URL: http://user-service:${USER_SERVICE_PORT:-8082}
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: ${API_GATEWAY_PORT:-8080}
      JAVA_OPTS: ${JAVA_OPTS:--Xmx512m -Xms256m}
      RESILIENCE4J_CIRCUITBREAKER_ENABLED: "true"
      RESILIENCE4J_CIRCUITBREAKER_FAILURE_RATE_THRESHOLD: "50"
      RESILIENCE4J_RETRY_MAX_ATTEMPTS: "3"
    ports:
      - "${API_GATEWAY_PORT:-8080}:${API_GATEWAY_PORT:-8080}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_GATEWAY_PORT:-8080}/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - helpdesk-network
    labels:
      - "app=helpdesk"
      - "service=gateway"

  frontend:
    image: ${AZURE_REGISTRY_NAME:-localhost}.azurecr.io/frontend:${IMAGE_TAG:-latest}
    restart: on-failure:5
    environment:
      VITE_API_BASE_URL: ${FRONTEND_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - helpdesk-network
    labels:
      - "app=helpdesk"
      - "service=frontend"

networks:
  helpdesk-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
