services:
  mongodb:
    image: mongo:7
    container_name: helpdesk-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  ticket-service:
    build:
      context: ./ticket-service
    container_name: helpdesk-ticket-service
    restart: unless-stopped
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/helpdesk_tickets
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
    container_name: helpdesk-user-service
    restart: unless-stopped
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/helpdesk_users
    ports:
      - "8082:8082"
    depends_on:
      mongodb:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
    container_name: helpdesk-api-gateway
    restart: unless-stopped
    environment:
      TICKET_SERVICE_URL: http://ticket-service:8081
      USER_SERVICE_URL: http://user-service:8082
    ports:
      - "8080:8080"
    depends_on:
      - ticket-service
      - user-service

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: helpdesk-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway

volumes:
  mongodb_data:
