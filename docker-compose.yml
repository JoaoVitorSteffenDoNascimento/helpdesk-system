services:
  mongodb:
    image: mongo:${MONGODB_VERSION}
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    cpus: '0.5'
    networks:
      - helpdesk-network
    labels:
      - "app=helpdesk"
      - "service=database"

  ticket-service:
    build:
      context: ./ticket-service
      dockerfile: Dockerfile
    restart: on-failure:5
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:${MONGODB_PORT}/${MONGODB_DATABASE}_tickets
      SPRING_APPLICATION_NAME: ticket-service
      SERVER_PORT: ${TICKET_SERVICE_PORT}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${TICKET_SERVICE_PORT}:${TICKET_SERVICE_PORT}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${TICKET_SERVICE_PORT}/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: '0.5'
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - helpdesk-network
    labels:
      - "app=helpdesk"
      - "service=microservice"
      - "microservice=ticket"
    # Restart apenas este serviço se cair, não afeta os outros
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    restart: on-failure:5
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:${MONGODB_PORT}/${MONGODB_DATABASE}_users
      SPRING_APPLICATION_NAME: user-service
      SERVER_PORT: ${USER_SERVICE_PORT}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${USER_SERVICE_PORT}/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: '0.5'
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - helpdesk-network
    labels:
      - "app=helpdesk"
      - "service=microservice"
      - "microservice=user"
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    restart: on-failure:5
    environment:
      TICKET_SERVICE_URL: ${TICKET_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: ${API_GATEWAY_PORT}
      JAVA_OPTS: ${JAVA_OPTS}
      # Circuit breaker para resilência
      RESILIENCE4J_CIRCUITBREAKER_ENABLED: "true"
      RESILIENCE4J_CIRCUITBREAKER_FAILURE_RATE_THRESHOLD: "50"
      RESILIENCE4J_CIRCUITBREAKER_WAIT_DURATION_IN_OPEN_STATE: "10000"
      RESILIENCE4J_RETRY_ENABLED: "true"
      RESILIENCE4J_RETRY_MAX_ATTEMPTS: "3"
      RESILIENCE4J_RETRY_WAIT_DURATION: "1000"
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_GATEWAY_PORT}/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: '0.5'
    networks:
      - helpdesk-network
    labels:
      - "app=helpdesk"
      - "service=gateway"
    # NÃO depende mais de ticket/user sendo healthy
    # Ele inicia independente e trata erros via circuit breaker
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_URL}
    restart: on-failure:5
    ports:
      - "${FRONTEND_PORT}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: '0.25'
    networks:
      - helpdesk-network
    labels:
      - "app=helpdesk"
      - "service=frontend"
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

networks:
  helpdesk-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
